[ids]
*

[main]
capslock = esc
tab = overload(control, tab)
backslash = overload(control, backslash)
q = overload(q_meta_arrows, q)

[shift]
capslock = toggle(caps_word)

[q_meta_arrows]
y = M-left
i = M-down
o = M-up
p = M-right

[caps_word]
a = A
b = B
c = C
d = D
e = E
f = F
g = G
h = H
i = I
j = J
k = K
l = L
m = M
n = N
o = O
p = P
q = Q
r = R
s = S
t = T
u = U
v = V
w = W
x = X
y = Y
z = Z
space = clearm(space)
tab = clearm(tab)
enter = clearm(enter)
esc = clear()
escape = clear()
dot = clearm(dot)
comma = clearm(comma)
semicolon = clearm(semicolon)
apostrophe = clearm(apostrophe)
slash = clearm(slash)
backslash = clearm(backslash)
